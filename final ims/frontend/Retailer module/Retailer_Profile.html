<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retailer Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#122033;
      --muted:#667085;
      --line:#e5e7eb;
      --primary:#2e6bc5;
      --primary-soft:#eef4ff;
      --success:#16a34a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Nunito Sans',sans-serif;
      background:linear-gradient(180deg,#eef4ff 0,#f8fbff 160px,#f5f7fb 160px);
      color:var(--text);
    }
    .page{
      min-height:100vh;
      padding:28px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin:0 auto 24px;
      max-width:1180px;
    }
    .topbar-left{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }
    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:var(--primary);
      font-weight:800;
      font-size:13px;
    }
    .topbar-avatar{
      width:38px;
      height:38px;
      border-radius:50%;
      background:var(--primary);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(46,107,197,.22);
    }
    .shell{
      max-width:1180px;
      margin:0 auto;
      display:grid;
      grid-template-columns:320px minmax(0,1fr);
      gap:22px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 20px 50px rgba(15,23,42,.06);
    }
    .hero-card{
      padding:28px;
      position:sticky;
      top:24px;
      align-self:start;
    }
    .avatar-lg{
      width:78px;
      height:78px;
      border-radius:24px;
      background:linear-gradient(135deg,#2e6bc5,#4f7de2);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:800;
      margin-bottom:18px;
    }
    .eyebrow{
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--primary);
      margin-bottom:8px;
    }
    .hero-card h1{
      margin:0 0 6px;
      font-size:28px;
      line-height:1.15;
    }
    .hero-card p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
    }
    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary);
      font-size:12px;
      font-weight:800;
    }
    .content{
      display:flex;
      flex-direction:column;
      gap:20px;
    }
    .section{
      padding:24px;
    }
    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .section-title{
      font-size:18px;
      font-weight:800;
    }
    .section-sub{
      color:var(--muted);
      font-size:13px;
    }
    .detail-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .detail{
      padding:16px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fbfcfe;
    }
    .detail-label{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
    }
    .detail-value{
      font-size:14px;
      font-weight:800;
      line-height:1.45;
      word-break:break-word;
    }
    .store-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:14px;
    }
    .store-card{
      padding:18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
    }
    .store-name{
      font-size:15px;
      font-weight:800;
      margin-bottom:6px;
    }
    .store-meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }
    .store-status{
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin-top:12px;
      padding:6px 10px;
      border-radius:999px;
      background:#ecfdf3;
      color:var(--success);
      font-size:12px;
      font-weight:800;
    }
    .empty{
      padding:22px;
      border:1px dashed var(--line);
      border-radius:18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      background:#fbfcfe;
    }
    @media (max-width: 900px){
      .page{padding:18px}
      .shell{grid-template-columns:1fr}
      .hero-card{position:static}
      .detail-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left">
        <a class="back-link" href="Retialer_Dashboard.html">Back to Dashboard</a>
      </div>
      <div class="topbar-avatar" id="avatar" onclick="showProfileModal()"></div>
    </div>

    <div class="shell">
      <section class="card hero-card">
        <div class="avatar-lg" id="profileHeroAvatar">RT</div>
        <div class="eyebrow">Retailer Profile</div>
        <h1 id="profileName">Retailer</h1>
        <p id="profileSubtitle">Your account, business information, and multi-store setup live here.</p>
        <div class="chips">
          <span class="chip" id="profileRoleChip">Retailer</span>
          <span class="chip" id="profileStoreChip">No active store</span>
        </div>
      </section>

      <div class="content">
        <section class="card section">
          <div class="section-head">
            <div>
              <div class="section-title">Business Details</div>
              <div class="section-sub">Collected from your retailer setup and synced to the backend.</div>
            </div>
          </div>
          <div class="detail-grid" id="businessDetails"></div>
        </section>

        <section class="card section">
          <div class="section-head">
            <div>
              <div class="section-title">Stores</div>
              <div class="section-sub">Store access and switching are scoped from this profile data.</div>
            </div>
          </div>
          <div class="store-list" id="storeList"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="../js/mockData.js"></script>
  <script src="api-config.js"></script>
  <script>
    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderDetailCard(label, value) {
      return (
        '<div class="detail">' +
          '<div class="detail-label">' + escapeHtml(label) + '</div>' +
          '<div class="detail-value">' + escapeHtml(value || '-') + '</div>' +
        '</div>'
      );
    }

    document.addEventListener('DOMContentLoaded', async function () {
      const session = await window.RetailerApi.refreshSession();
      if (!session) return;

      const profile = session.profile || {};
      const stores = window.RetailerApi.getStoresFromProfile();
      const currentStore = window.RetailerApi.getCurrentStore();
      const initials = String(session.initials || 'RT').slice(0, 2).toUpperCase();

      document.getElementById('avatar').textContent = initials;
      document.getElementById('profileHeroAvatar').textContent = initials;
      document.getElementById('profileName').textContent = session.name || 'Retailer';
      document.getElementById('profileSubtitle').textContent =
        (profile.businessName || 'Retail business') +
        (session.email ? ' - ' + session.email : '');
      document.getElementById('profileStoreChip').textContent =
        currentStore ? currentStore.name : 'No active store';

      document.getElementById('businessDetails').innerHTML = [
        renderDetailCard('Business Name', profile.businessName),
        renderDetailCard('Business Email', profile.businessEmail || session.email),
        renderDetailCard('Phone', profile.businessPhone),
        renderDetailCard('Retailer Code', profile.retailerCode),
        renderDetailCard('Business Type', profile.businessType),
        renderDetailCard('Primary Industry', profile.primaryIndustry),
        renderDetailCard('Currency', profile.currency),
        renderDetailCard('Fiscal Year', profile.fiscalYear),
        renderDetailCard('Owner Name', profile.ownerName || session.name),
        renderDetailCard('Owner Email', profile.ownerEmail || session.email),
        renderDetailCard('Tax ID', profile.taxId),
        renderDetailCard('Website', profile.website),
        renderDetailCard('Address', profile.address),
      ].join('');

      const storeList = document.getElementById('storeList');
      if (!stores.length) {
        storeList.innerHTML = '<div class="empty">No stores have been configured yet.</div>';
        return;
      }

      storeList.innerHTML = stores.map(function (store) {
        return (
          '<div class="store-card">' +
            '<div class="store-name">' + escapeHtml(store.name) + '</div>' +
            '<div class="store-meta">' +
              escapeHtml(store.address || 'No address added') + '<br>' +
              'Contact: ' + escapeHtml(store.contactPerson || 'Store Manager') + '<br>' +
              'Phone: ' + escapeHtml(store.phone || '-') + '<br>' +
              'Type: ' + escapeHtml(store.type || 'Retail Store') +
            '</div>' +
            '<div class="store-status">' + escapeHtml(store.status || 'active') + '</div>' +
          '</div>'
        );
      }).join('');
    });
  </script>
</body>
</html>
