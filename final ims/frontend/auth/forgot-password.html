<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Stock Overflow</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-form-side">
      <a href="../index.html" class="brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/>
          </svg>
        </div>
        Stock Overflow
      </a>

      <div class="auth-header">
        <h1>Forgot password?</h1>
        <p>Enter your email and we'll send you instructions to reset your password.</p>
      </div>

      <form id="forgotPasswordForm" novalidate>
        <div class="form-group" style="width: 100%;">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-icon-group">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            <input type="email" class="form-control" id="email" placeholder="your.email@example.com" required>
          </div>
          <div class="invalid-feedback" id="emailFeedback">Please enter a valid email address.</div>
        </div>

        <div style="width: 100%;">
          <button type="submit" class="btn btn-primary btn-block">Submit</button>
        </div>

        <div class="auth-footer" style="margin-top: 1.5rem;">
          <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Return to Login</a>
        </div>
      </form>

      <div class="copyright">
        © 2026 Stock Overflow
      </div>
    </div>
    <div class="auth-image-side">
      <img src="../assets/forget_pass.png" alt="Stock Overflow Warehouse" class="hero-dashboard-img">
    </div>
  </div>

  <script src="../js/mockData.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
