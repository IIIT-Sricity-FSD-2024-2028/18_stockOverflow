<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Store Management - Admin - Stock Overflow</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .retailer-block { background:#fff; border:1px solid var(--border-color); border-radius:12px; margin-bottom:1.5rem; overflow:hidden; }
    .retailer-header { display:flex; align-items:center; gap:1rem; padding:1rem 1.25rem; border-bottom:1px solid var(--border-color); }
    .retailer-icon { width:42px;height:42px;background:#eff6ff;border-radius:10px;display:flex;align-items:center;justify-content:center; }
    .retailer-icon svg { width:22px;height:22px;stroke:var(--primary-color); }
    .retailer-name { font-size:1rem;font-weight:700;color:var(--text-main); }
    .retailer-meta { font-size:0.78rem;color:var(--text-muted);margin-top:2px; display:flex;gap:1rem; }
    .store-cards-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;padding:1rem 1.25rem; }
    .ms-store-card { background:#f8fafc;border:1px solid var(--border-color);border-radius:8px;padding:1rem; }
    .ms-store-name { font-weight:600;font-size:0.95rem;margin-bottom:0.5rem; }
    .ms-store-meta { font-size:0.8rem;color:var(--text-muted);margin:3px 0;display:flex;align-items:center;gap:5px; }
    .ms-store-meta svg { width:13px;height:13px; }
    .ms-products-val { color:var(--primary-color);font-weight:700;font-size:0.95rem; }
    .ms-actions { display:flex;gap:0.5rem;margin-top:0.75rem;align-items:center; }
    .ms-btn-view { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: #fff; color: var(--text-main); cursor: pointer; font-size: 0.825rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .ms-btn-edit { padding: 6px 16px; border-radius: 8px; border: none; background: #f97316; color: #fff; cursor: pointer; font-size: 0.825rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .ms-btn-del { width: 32px; height: 32px; background: transparent; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #ef4444; }
    .ms-btn-del:hover { color: #dc2626; }
    .ms-btn-del svg { width: 20px; height: 20px; }
    .filter-bar { display:flex;gap:1rem;margin-bottom:1.5rem;align-items:center; }
    .filter-search { flex:1;display:flex;align-items:center;gap:0.5rem;background:#fff;border:1px solid var(--border-color);border-radius:8px;padding:0.6rem 1rem; }
    .filter-search input { border:none;outline:none;flex:1;font-family:inherit;font-size:0.9rem; }
    .status-badge { display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.75rem;font-weight:600; }
    .badge-active { background:#dcfce7;color:#16a34a; }
    .badge-inactive { background:#fee2e2;color:#dc2626; }
    .badge-pending { background:#fef3c7;color:#d97706; }
    .badge-suspended { background:#fce7f3;color:#9d174d; }
    .header-actions { display:flex;gap:0.75rem; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="brand">
        <div class="brand-icon"><svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/></svg></div>
        Stock Overflow
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a>
      <a href="stores.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Store Selection</a>
      <a href="users.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>Users</a>
      <a href="roles.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>Roles &amp; Permissions</a>
      <a href="multistore.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>Multi-Store Setup</a>
      <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>Reports</a>
      <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </button>
    </div>
  </aside>

  <main class="main-wrapper">
    <header class="topbar">
      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Search...">
      </div>
      <div class="topbar-right">
        <button class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
        <div class="user-profile">
          <div class="user-avatar" id="navAvatar">AD</div>
          <div class="user-info"><span class="user-name" id="navName">Admin User</span><span class="user-role">Administrator</span></div>
        </div>
      </div>
    </header>

    <div class="content-area">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <h1 class="page-title">Multi-Store Management</h1>
          <p class="page-subtitle">Manage all retailers and their store locations</p>
        </div>
        <div class="header-actions" style="display:flex;gap:1.5rem;">
          <button class="btn btn-light" onclick="openAddRetailerModal()">+ Add Retailer</button>
          <button class="btn btn-primary" onclick="openAddStoreModal()">+ Add Store</button>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="msSearch" placeholder="Search by retailer or store name...">
        </div>
        <select class="form-control" style="width:180px;" id="msStatusFilter">
          <option value="">All Statuses</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
          <option value="Pending">Pending</option>
          <option value="Suspended">Suspended</option>
        </select>
      </div>

      <div id="retailersContainer"><!-- JS rendered --></div>
    </div>
  </main>

  <!-- View Store Modal -->
  <div class="modal-overlay" id="msViewModal" style="z-index: 1002;">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">Store Details</h2>
        <button class="btn-icon" onclick="closeMSView()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="msViewBody" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
        <!-- JS Rendered -->
      </div>
      <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
        <button class="btn btn-primary" onclick="closeMSView()">Close</button>
      </div>
    </div>
  </div>

  <!-- Edit Store Modal -->
  <div class="modal-overlay" id="msEditModal" style="z-index: 1003;">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">Edit Store</h2>
        <button class="btn-icon" onclick="closeMSEdit()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="msEditForm" style="margin-top: 1rem;">
        <input type="hidden" id="ms_edit_id">
        <div class="form-group">
          <label class="form-label">Store Name</label>
          <input type="text" class="form-control" id="ms_edit_name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" class="form-control" id="ms_edit_location" required>
        </div>
        <div class="form-group">
          <label class="form-label">Manager</label>
          <input type="text" class="form-control" id="ms_edit_manager" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" id="ms_edit_phone" required pattern="\d{10}" title="Please enter exactly 10 digits" placeholder="e.g. 9876543210">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn btn-light" onclick="closeMSEdit()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Retailer Modal -->
  <div class="modal-overlay" id="addRetailerModal" style="z-index: 1005;">
    <div class="modal-content" style="max-width: 450px;">
      <div class="modal-header">
        <h2 class="modal-title">Add Retailer</h2>
        <button class="btn-icon" onclick="closeAddRetailerModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="addRetailerForm" style="margin-top:1rem;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="ar_name" required placeholder="e.g. Vikas Kumar">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="ar_email" required placeholder="e.g. vikas@retail.com">
        </div>
        <div class="form-group">
          <label class="form-label">Temporary Password</label>
          <input type="password" class="form-control" id="ar_password" required placeholder="••••••••">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn btn-light" onclick="closeAddRetailerModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Retailer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Store Modal (Refinement) -->
  <div class="modal-overlay" id="addStoreModalMS" style="z-index: 1006;">
    <div class="modal-content" style="max-width: 450px;">
      <div class="modal-header">
        <h2 class="modal-title">Add Store</h2>
        <button class="btn-icon" onclick="closeAddStoreModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="addStoreFormMS" style="margin-top:1rem;">
        <div class="form-group">
          <label class="form-label">Assign to Retailer</label>
          <select class="form-control" id="as_retailer_id" required>
            <option value="">Select Retailer...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Store Name</label>
          <input type="text" class="form-control" id="as_name" required placeholder="e.g. North Side Outlet">
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" class="form-control" id="as_location" required placeholder="e.g. 123 North St, City">
        </div>
        <div class="form-group">
          <label class="form-label">Store Phone (10 digits)</label>
          <input type="text" class="form-control" id="as_phone" required pattern="\d{10}" placeholder="9876543210">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" class="btn btn-light" onclick="closeAddStoreModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Store</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api-config.js"></script>
  <script src="../js/admin-api.js"></script>
  <script src="../js/mockData.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Auth guard
      const session = JSON.parse(localStorage.getItem('so_session') || 'null');
      if (!session || session.role !== 'admin') { window.location.href = '../index.html'; }

      if(document.getElementById('logoutBtn'))
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('so_session'); window.location.href='../index.html'; });

      const container = document.getElementById('retailersContainer');
      const badgeClass = (s) => ({
        Active: 'badge-active',
        Inactive: 'badge-inactive',
        Pending: 'badge-pending',
        Suspended: 'badge-suspended'
      }[s] || 'badge-inactive');

      let USERS_DATA = [];
      let STORES_DATA = [];

      async function fetchData() {
        try {
          USERS_DATA = await window.AdminApi.getAllUsers();
          STORES_DATA = await window.AdminApi.getAllStores();
        } catch (e) {
          console.error('Failed to load multistore data', e);
        }
        render();
      }

      function getRetailersWithStores() {
        const retailers = USERS_DATA.filter(u => String(u.role).toLowerCase() === 'retailer');
        return retailers.map(r => {
          return {
            id: r.id,
            name: r.name,
            email: r.email,
            status: r.status,
            stores: STORES_DATA.filter(s => String(s.retailerId) === String(r.id) || s.manager === r.name || s.retailerName === r.name)
          };
        });
      }

      function render() {
        const retailers = getRetailersWithStores();
        const searchEl = document.getElementById('msSearch');
        const statusEl = document.getElementById('msStatusFilter');
        const q = searchEl ? searchEl.value.toLowerCase() : '';
        const status = statusEl ? statusEl.value : '';

        container.innerHTML = '';
        
        const filteredRetailers = retailers.filter(r => {
          const matchQ = r.name.toLowerCase().includes(q) || r.stores.some(s => s.name.toLowerCase().includes(q));
          const matchStatus = status ? (r.status === status || r.stores.some(s => s.status === status)) : true;
          return matchQ && matchStatus;
        });

        if (filteredRetailers.length === 0) {
          container.innerHTML = '<p style="text-align:center; padding: 2rem; color: var(--text-muted);">No retailers or stores found.</p>';
          return;
        }

        filteredRetailers.forEach(r => {
          const block = document.createElement('div');
          block.className = 'retailer-block';
          block.innerHTML = `
            <div class="retailer-header">
              <div class="retailer-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
              <div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="retailer-name">${r.name}</span>
                  <span class="status-badge ${badgeClass(r.status)}">${r.status || 'Active'}</span>
                </div>
                <div class="retailer-meta">
                  <span>✉ ${r.email}</span>
                  <span>🏪 ${r.stores.length} Store${r.stores.length!==1?'s':''}</span>
                </div>
              </div>
            </div>
            <div class="store-cards-grid">
              ${r.stores.map(s=>`
                <div class="ms-store-card">
                  <div class="ms-store-name">${s.name} <span class="status-badge ${badgeClass(s.status || 'Active')}" style="font-size:0.7rem;margin-left:4px;">${s.status || 'Active'}</span></div>
                  <div class="ms-store-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>${s.location || '—'}</div>
                  <div class="ms-store-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>${s.manager || '—'}</div>
                  <div class="ms-products-row" style="margin-top: 0.5rem;">
                    <span class="ms-products-val" style="font-size: 0.85rem; color: var(--text-muted);">ID: ${s.id}</span>
                  </div>
                  <div class="ms-actions">
                    <button class="ms-btn-view" onclick="viewMSStore('${s.id}')">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      View
                    </button>
                    <button class="ms-btn-edit" onclick="editMSStore('${s.id}')">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      Edit
                    </button>
                    <button class="ms-btn-del" onclick="toggleStoreStatus('${s.id}')" title="${s.status === 'Suspended' ? 'Activate' : 'Suspend'}">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        ${s.status === 'Suspended' ? '<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>' : '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>'}
                      </svg>
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
          container.appendChild(block);
        });
      }

      window.viewMSStore = (id) => {
        const store = STORES_DATA.find(x => String(x.id) === String(id));
        if (!store) return;
        const body = document.getElementById('msViewBody');
        body.innerHTML = `
          <div style="background:var(--bg-light); padding:1rem; border-radius:8px;">
            <p><strong>Name:</strong> ${store.name}</p>
            <p><strong>Location:</strong> ${store.location || '—'}</p>
            <p><strong>Manager:</strong> ${store.manager || '—'}</p>
            <p><strong>Status:</strong> <span class="status-badge ${badgeClass(store.status || 'Active')}">${store.status || 'Active'}</span></p>
          </div>
        `;
        document.getElementById('msViewModal').classList.add('active');
      };
      
      window.closeMSView = () => document.getElementById('msViewModal').classList.remove('active');

      window.editMSStore = (id) => {
        const store = STORES_DATA.find(x => String(x.id) === String(id));
        if (!store) return;
        document.getElementById('ms_edit_id').value = store.id;
        document.getElementById('ms_edit_name').value = store.name;
        document.getElementById('ms_edit_location').value = store.location || '';
        document.getElementById('ms_edit_manager').value = store.manager || '';
        document.getElementById('ms_edit_phone').value = store.phone || '';
        document.getElementById('msEditModal').classList.add('active');
      };

      window.closeMSEdit = () => {
        document.getElementById('msEditModal').classList.remove('active');
        document.getElementById('msEditForm').reset();
      };

      document.getElementById('msEditForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('ms_edit_id').value;
        const payload = {
          name: document.getElementById('ms_edit_name').value,
          location: document.getElementById('ms_edit_location').value,
          manager: document.getElementById('ms_edit_manager').value,
          phone: document.getElementById('ms_edit_phone').value,
        };
        try {
          await window.AdminApi.updateStore(id, payload);
          fetchData(); // reload
          closeMSEdit();
        } catch (error) {
          alert('Error: ' + (window.IMS_HTTP ? window.IMS_HTTP.getErrorMessage(error) : error.message));
        }
      });

      window.toggleStoreStatus = async (id) => {
        const store = STORES_DATA.find(x => String(x.id) === String(id));
        if (!store) return;
        const newStatus = store.status === 'Suspended' ? 'Active' : 'Suspended';
        try {
          await window.AdminApi.updateStore(id, { status: newStatus });
          fetchData(); // reload
        } catch (error) {
          alert('Error: ' + (window.IMS_HTTP ? window.IMS_HTTP.getErrorMessage(error) : error.message));
        }
      };

      const searchEl = document.getElementById('msSearch');
      if (searchEl) searchEl.addEventListener('input', render);
      const statusEl = document.getElementById('msStatusFilter');
      if (statusEl) statusEl.addEventListener('change', render);

      // Add Retailer Modal Logic
      window.openAddRetailerModal = () => document.getElementById('addRetailerModal').classList.add('active');
      window.closeAddRetailerModal = () => document.getElementById('addRetailerModal').classList.remove('active');
      
      document.getElementById('addRetailerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          name: document.getElementById('ar_name').value,
          email: document.getElementById('ar_email').value,
          password: document.getElementById('ar_password').value,
          role: 'retailer',
          status: 'Active'
        };
        try {
          await window.AdminApi.createUser(payload);
          fetchData();
          closeAddRetailerModal();
          document.getElementById('addRetailerForm').reset();
        } catch (error) {
          alert('Error: ' + (window.IMS_HTTP ? window.IMS_HTTP.getErrorMessage(error) : error.message));
        }
      });

      // Add Store Modal Logic
      window.openAddStoreModal = () => {
        const retailers = USERS_DATA.filter(u => String(u.role).toLowerCase() === 'retailer');
        const select = document.getElementById('as_retailer_id');
        select.innerHTML = '<option value="">Select Retailer...</option>' + 
          retailers.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        document.getElementById('addStoreModalMS').classList.add('active');
      };
      window.closeAddStoreModal = () => document.getElementById('addStoreModalMS').classList.remove('active');

      document.getElementById('addStoreFormMS').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          name: document.getElementById('as_name').value,
          retailerId: document.getElementById('as_retailer_id').value,
          location: document.getElementById('as_location').value,
          phone: document.getElementById('as_phone').value,
          manager: document.getElementById('as_retailer_id').options[document.getElementById('as_retailer_id').selectedIndex].text,
          status: 'Active'
        };
        try {
          await window.AdminApi.createStore(payload);
          fetchData();
          closeAddStoreModal();
          document.getElementById('addStoreFormMS').reset();
        } catch (error) {
          alert('Error: ' + (window.IMS_HTTP ? window.IMS_HTTP.getErrorMessage(error) : error.message));
        }
      });

      // Initial Load
      fetchData();
    });
  </script>
</body>
</html>
