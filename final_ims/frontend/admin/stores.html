<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Selection - Admin - Stock Overflow</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .stores-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .store-card {
      background: #fff; border: 1px solid var(--border-color); border-radius: 12px;
      padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .store-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-color: var(--primary-color); }
    .store-card-header { display: flex; align-items: center; gap: 0.75rem; }
    .store-icon {
      width: 48px; height: 48px; background: #fef3c7; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .store-icon svg { width: 24px; height: 24px; color: #f59e0b; }
    .store-name { font-size: 1rem; font-weight: 700; color: var(--text-main); }
    .store-meta-row {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.875rem; color: var(--text-muted);
    }
    .store-meta-row svg { width: 15px; height: 15px; flex-shrink: 0; }
    .enter-btn {
      width: 100%; padding: 0.65rem; border-radius: 8px; border: none;
      background: #16a34a; color: #fff; font-weight: 600; font-size: 0.9rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; transition: background 0.2s;
    }
    .enter-btn:hover { background: #15803d; }
    /* Store Detail Panel */
    .store-detail-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; align-items: center; justify-content: center;
    }
    .store-detail-overlay.active { display: flex; }
    .store-detail-panel {
      background: #fff; border-radius: 14px; width: min(620px, 92vw);
      max-height: 88vh; overflow-y: auto; padding: 2rem;
    }
    .sdp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    .sdp-kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .sdp-kpi { background: #f8fafc; border-radius: 8px; padding: 1rem; text-align: center; }
    .sdp-kpi-val { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); }
    .sdp-kpi-lbl { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/></svg>
        </div>
        Stock Overflow
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a>
      <a href="stores.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Store Selection</a>
      <a href="users.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>Users</a>
      <a href="roles.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>Roles &amp; Permissions</a>
      <a href="multistore.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>Multi-Store Setup</a>
      <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>Reports</a>
      <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
      </button>
    </div>
  </aside>

  <main class="main-wrapper">
    <header class="topbar">
      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" placeholder="Search...">
      </div>
      <div class="topbar-right">
        <button class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
        <div class="user-profile">
          <div class="user-avatar" id="navAvatar">AD</div>
          <div class="user-info">
            <span class="user-name" id="navName">Admin User</span>
            <span class="user-role" id="navRole">Administrator</span>
          </div>
        </div>
      </div>
    </header>

    <div class="content-area">
      <div class="page-header">
        <h1 class="page-title">Select Store</h1>
        <p class="page-subtitle">Choose a store to continue or access the global admin dashboard</p>
      </div>
      <div class="stores-grid" id="storesGrid">
        <!-- JS rendered -->
      </div>
    </div>
  </main>

  <!-- Store Detail Overlay -->
  <div class="store-detail-overlay" id="storeDetailOverlay">
    <div class="store-detail-panel">
      <div class="sdp-header">
        <div>
          <h2 id="sdpName" style="font-size:1.25rem;font-weight:700;color:var(--text-main);"></h2>
          <p id="sdpLocation" style="font-size:0.875rem;color:var(--text-muted);margin-top:4px;"></p>
        </div>
        <button class="btn-icon" onclick="document.getElementById('storeDetailOverlay').classList.remove('active')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sdp-kpis">
        <div class="sdp-kpi"><div class="sdp-kpi-val" id="sdpProducts">-</div><div class="sdp-kpi-lbl">Total Products</div></div>
        <div class="sdp-kpi"><div class="sdp-kpi-val" id="sdpOrders">-</div><div class="sdp-kpi-lbl">Total Orders</div></div>
        <div class="sdp-kpi"><div class="sdp-kpi-val" id="sdpRevenue">-</div><div class="sdp-kpi-lbl">Revenue</div></div>
      </div>
      <div class="card" style="padding:1rem;margin-bottom:0;">
        <p style="font-size:0.875rem;font-weight:600;color:var(--text-main);margin-bottom:0.5rem;">Manager</p>
        <p id="sdpManager" style="font-size:0.875rem;color:var(--text-muted);"></p>
        <p style="font-size:0.875rem;font-weight:600;color:var(--text-main);margin:0.75rem 0 0.5rem;">Store Performance</p>
        <div style="height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;">
          <div id="sdpPerf" style="height:100%;background:var(--primary-color);border-radius:4px;transition:width 0.6s;"></div>
        </div>
        <p id="sdpPerfLabel" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;"></p>
      </div>
    </div>
  </div>

  <script src="../js/mockData.js"></script>
  <script src="../js/api-config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Auth guard
      const session = JSON.parse(localStorage.getItem('so_session') || 'null');
      if (!session || session.role !== 'admin') { window.location.href = '../index.html'; }

      // Logout
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) logoutBtn.addEventListener('click', () => { localStorage.removeItem('so_session'); window.location.href = '../index.html'; });

      // Nav
      if (session) {
        const navName = document.getElementById('navName'); if (navName) navName.textContent = session.name;
        const initials = session.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        const navAvatar = document.getElementById('navAvatar'); if (navAvatar) navAvatar.textContent = initials;
      }

      const grid = document.getElementById('storesGrid');
      let STORE_DATA = [];

      // Fetch from live API (StoresService merges retailer stores + admin stores)
      try {
        STORE_DATA = await window.IMS_HTTP.request('/stores');
      } catch (e) {
        console.warn('API unavailable, falling back to mockData', e);
        STORE_DATA = typeof DB !== 'undefined' && DB.getStores ? DB.getStores() : [];
      }

      if (!STORE_DATA || STORE_DATA.length === 0) {
        grid.innerHTML = '<p style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 3rem;">No stores found. Retailers need to complete their setup to add stores.</p>';
      } else {
        STORE_DATA.forEach(s => {
          const card = document.createElement('div');
          card.className = 'store-card';
          const statusColor = String(s.status || 'Active').toLowerCase() === 'active' ? '#16a34a' : '#64748b';
          card.innerHTML = `
            <div class="store-card-header">
              <div class="store-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </div>
              <div style="flex:1;">
                <div class="store-name">${s.name}</div>
                <span style="font-size:0.72rem;font-weight:600;padding:2px 8px;border-radius:20px;background:${statusColor}22;color:${statusColor};">${s.status || 'Active'}</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:0.4rem;">
              <div class="store-meta-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
                ${s.location || 'Unknown location'}
              </div>
              <div class="store-meta-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
                Manager: ${s.manager || 'Not assigned'}
              </div>
              ${s.retailerId ? `<div class="store-meta-row" style="font-size:0.78rem;color:var(--text-muted);">Retailer ID: ${s.retailerId}</div>` : ''}
            </div>
            <button class="enter-btn" onclick="openStoreDetail('${s.id}')">
              View Details &rarr;
            </button>
          `;
          grid.appendChild(card);
        });
      }

      window.openStoreDetail = (id) => {
        const s = STORE_DATA.find(x => String(x.id) === String(id));
        if (!s) return;
        document.getElementById('sdpName').textContent = s.name;
        document.getElementById('sdpLocation').textContent = s.location || '—';
        document.getElementById('sdpProducts').textContent = (s.products || '—').toLocaleString?.() ?? '—';
        document.getElementById('sdpOrders').textContent = (s.orders || 0).toLocaleString();
        document.getElementById('sdpRevenue').textContent = s.revenue || '$0';
        document.getElementById('sdpManager').textContent = s.manager || 'Not assigned';
        const perf = s.orders ? Math.round((s.orders / 450) * 100) : 0;
        document.getElementById('sdpPerf').style.width = Math.min(perf, 100) + '%';
        document.getElementById('sdpPerfLabel').textContent = `${Math.min(perf, 100)}% capacity utilization`;
        document.getElementById('storeDetailOverlay').classList.add('active');
      };
    });
  </script>
</body>
</html>
