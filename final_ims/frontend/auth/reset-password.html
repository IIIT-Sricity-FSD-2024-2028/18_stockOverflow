<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Stock Overflow</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-form-side">
      <a href="../index.html" class="brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/>
          </svg>
        </div>
        Stock Overflow
      </a>

      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your new password to continue.</p>
      </div>

      <form id="resetPasswordForm" novalidate>
        <div class="form-group" style="width: 100%;">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="input-icon-group">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" class="form-control" id="newPassword" placeholder="••••••••" required minlength="8">
            <button type="button" class="password-toggle-btn" data-target="newPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <div class="invalid-feedback">Password must be at least 8 characters.</div>
        </div>

        <div class="form-group" style="width: 100%;">
          <label class="form-label" for="confirmNewPassword">Confirm Password</label>
          <div class="input-icon-group">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" class="form-control" id="confirmNewPassword" placeholder="••••••••" required minlength="8">
            <button type="button" class="password-toggle-btn" data-target="confirmNewPassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <div class="invalid-feedback">Passwords do not match.</div>
        </div>

        <div style="width: 100%;">
          <button type="submit" class="btn btn-primary btn-block">Change Password</button>
        </div>

        <div class="auth-footer" style="margin-top: 1.5rem;">
          <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Return to Login</a>
        </div>
      </form>

      <div class="copyright" style="margin-top: auto; padding-top: 2rem;">
        © 2026 Stock Overflow
      </div>
    </div>
    <div class="auth-image-side">
      <img src="../assets/reset-pass.jpg" alt="Stock Overflow Warehouse" class="hero-dashboard-img">
    </div>
  </div>

  <script src="../js/mockData.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
